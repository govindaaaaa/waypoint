<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Waypoint - Your Travel Planner</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🌍 Waypoint</h1>
            <p>Plan your perfect journey</p>
        </header>

        <main>
            <div class="input-section">
                <h2>Create Your Itinerary</h2>
                
                <form id="tripForm">
                    <div class="form-group">
                        <label for="destination">Destination</label>
                        <input type="text" id="destination" placeholder="e.g., Paris, Tokyo, New York" required>
                    </div>

                    <div class="form-group">
                        <label for="days">Number of Days</label>
                        <input type="number" id="days" min="1" max="30" value="3" required>
                    </div>

                    <div class="form-group">
                        <label for="budget">Budget (USD)</label>
                        <input type="number" id="budget" min="100" step="100" placeholder="e.g., 1000" required>
                    </div>

                    <div class="form-group">
                        <label for="interests">Interests</label>
                        <select id="interests" required>
                            <option value="adventure">Adventure</option>
                            <option value="culture">Culture & History</option>
                            <option value="relaxation">Relaxation</option>
                            <option value="food">Food & Dining</option>
                            <option value="nature">Nature</option>
                        </select>
                    </div>

                    <button type="submit" class="btn-generate">Generate Itinerary</button>
                </form>
            </div>

            <div class="output-section" id="outputSection" style="display: none;">
                <h2>Your Personalized Itinerary</h2>
                <div id="itineraryOutput"></div>
            </div>
        </main>

        <footer>
            <p>Built with ❤️ | Project by Govind Choudhary</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
