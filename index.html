<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Waypoint - Travel Planner</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🌍 Waypoint</h1>
            <p>Your Travel Planning Assistant</p>
        </header>

        <main>
            <div class="input-section">
                <h2>Plan Your Trip</h2>
                
                <form id="tripForm">
                    <div class="form-group">
                        <label for="destination">Where do you want to go?</label>
                        <input type="text" id="destination" placeholder="Enter destination" required>
                    </div>

                    <div class="form-group">
                        <label for="days">Number of Days</label>
                        <input type="number" id="days" min="1" max="30" value="3" required>
                    </div>

                    <div class="form-group">
                        <label for="interests">Travel Interests</label>
                        <select id="interests" required>
                            <option value="">Select your preference</option>
                            <option value="adventure">Adventure & Outdoors</option>
                            <option value="culture">Culture & History</option>
                            <option value="relaxation">Relaxation & Leisure</option>
                            <option value="food">Food & Culinary</option>
                            <option value="urban">Urban Exploration</option>
                        </select>
                    </div>

                    <button type="submit">Create Itinerary</button>
                </form>
            </div>

            <div class="output-section" id="outputSection">
                <!-- Itinerary will be displayed here -->
            </div>
        </main>

        <footer>
            <p>Day 2 Progress - Itinerary Generation Added ✅</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
